openapi: 3.1.0
info:
  title: Listings API
  version: 1.0.0
servers:
  - url: https://api.repliers.io
paths:
  /listings:
    post:
      summary: Listings Search
      description: Use this endpoint to search listings using various parameters.As your user provides inputs, you simply pass those inputs to this endpoint to retrieve the listings that match their preferences in real-time. <BR/><BR/>For more information refer to <a target="_blank" href="https://help.repliers.com/en/article/searching-filtering-and-pagination-guide-1q1n7x0">The Searching, Filtering and Paginating Listings Guide </a>.<br/><br/>Using this endpoint you can also request market statistics, dynamic map clusters and search images using AI.
      operationId: getting-started-with-your-api
      parameters:
        - name: addressKey
          in: query
          description: The address key of the property. Please see the address object of a listing to understand how the address key is constructed
          schema:
            type: string
        - name: agent
          in: query
          description: Filters listings by agent name or agent ID, for example, <code>John Doe</code>. Supports multiple values, for example ?agent=john&agent=mary
          schema:
            type: array
            items:
              type: string
        - name: aggregates
          in: query
          description: Aggregates values and counts for specified fields. Aggregates have many use cases, they're particularly useful for grouping and displaying acceptable values for fields that are used in filters. For more information refer to <a target="_blank" href="https://help.repliers.com/en/article/using-aggregates-to-determine-acceptable-values-for-filters-c88csc">Using Aggregates To Determine Acceptable Values For Filters</a>.
          schema:
            type: string
        - name: aggregatesUnique
          in: query
          description: Unique aggregates values and counts for specified fields. Should be used specifically for fields containing coma-separated values. Aggregates have many use cases, they're particularly useful for grouping and displaying acceptable values for fields that are used in filters. For more information refer to <a target="_blank" href="https://help.repliers.com/en/article/using-aggregates-to-determine-acceptable-values-for-filters-c88csc">Using Aggregates To Determine Acceptable Values For Filters</a>.
          schema:
            type: string
        - name: aggregateStatistics
          in: query
          description: If true, when both "aggregates" and "statistics" parameters are used, the requested statistics will be grouped by the requested aggregates.
          schema:
            type: boolean
        - name: amenities
          in: query
          description: "Example usage: ?amenities=Gym&amenities=Swimming Pool"
          schema:
            type: array
            items:
              type: string
        - name: amenitiesOperator
          in: query
          description: If set to "AND", listings must match all amenities values. If set to "OR", listings must match at least 1 amenities value. Default is "AND"
          schema:
            type: string
            enum:
              - AND
              - OR
              - ""
            default: ""
        - name: area
          in: query
          description: Filter by the geographical area of the listing (also referred to as region)
          schema:
            type: string
        - name: areaOrCity
          in: query
          description: Filters listings where either the address.area or address.city field matches any of the provided values.
          schema:
            type: array
            items:
              type: string
        - name: balcony
          in: query
          description: Filters listings by one or more values for balcony.
          schema:
            type: array
            items:
              type: string
        - name: basement
          in: query
          description: Filters listings by basement description using the supplied value.
          schema:
            type: array
            items:
              type: string
        - name: boardId
          in: query
          description: Filter by boardId. This is only required if your account has access to more than one MLS. You may specify one or more board IDs to filter by, if not specified, returns all boards that that account has access to be default.
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: brokerage
          in: query
          description: Filter results by brokerage name
          schema:
            type: string
        - name: businessSubType
          in: query
          schema:
            type: array
            items:
              type: string
        - name: businessType
          in: query
          schema:
            type: array
            items:
              type: string
        - name: city
          in: query
          description: Filter listing by one or more cities
          schema:
            type: array
            items:
              type: string
        - name: cityOrDistrict
          in: query
          description: Filters listings where either address.city or the address.district field matches any of the provided values.
          schema:
            type: array
            items:
              type: string
        - name: class
          in: query
          description: "The class of listing to filter the search results by.  Allowed values: <code>condo</code>, <code>residential</code>, <code>commercial</code>.  For backward compatibility, the following alias values are also allowed: <code>CondoProperty</code>, <code>ResidentialProperty</code>, <code>CommercialProperty</code>"
          schema:
            type: array
            items:
              type: string
        - name: cluster
          in: query
          description: If true, enables dynamic map clusters. For more information, refer to the <a target="_blank" href="https://help.repliers.com/en/article/map-clustering-implementation-guide-1c1tgl6/">Map Clustering Implementation Guide</a>.
          schema:
            type: boolean
        - name: clusterFields
          in: query
          description: Specifies which listing fields to include in cluster responses. Use comma-separated values (e.g., ?clusterFields=listPrice,soldPrice). For images you can limit quantity with brackets (e.g., ?clusterFields=images[5] returns first 5 images).
          schema:
            type: string
        - name: clusterLimit
          in: query
          description: Use this parameter to limit the amount of clusters returned when "cluster" is set to true. Values can be between 1 and 200. This parameter can only be used if "cluster" is set to true.
          schema:
            type: integer
            format: int32
        - name: clusterListingsThreshold
          in: query
          description: Controls the maximum cluster size for which detailed listing information is included in the response. By default, detailed listing data is only included when a cluster contains exactly 1 listing. Setting this parameter to a higher value (e.g., 5) will include a 'listings' array with full property details for any cluster containing that many or fewer listings. This reduces the need for additional API requests when users interact with small clusters. Values can be between 1 and 100. This parameter can only be used if "cluster" is set to true.
          schema:
            type: integer
            format: int32
        - name: clusterPrecision
          in: query
          description: Use this parameter to adjust the granularity of map clusters. A lower value aggregates listings into less clusters, a higher value aggregates listings into more clusters. Values can be between 0 and 29. This parameter can only be used if "cluster" is set to true.
          schema:
            type: integer
            format: int32
        - name: clusterStatistics
          in: query
          description: If true, when both "cluster" is true and the "statistics" parameter is used, the statistics will be calculated separately for each cluster. This could be useful in scenarios where understanding data on a per-cluster basis is important, such as when analyzing distinct groups or segments within your data.
          schema:
            type: boolean
        - name: coverImage
          in: query
          description: If specified, changes the cover image to the specified feature. For more information, refer to <a target="_blank" href="https://help.repliers.com/en/article/changing-the-cover-image-of-property-listings-with-ai-powered-coverimage-parameter-40861n">Changing the Cover Image of Property Listings with AI-Powered CoverImage Parameter</a>
          schema:
            type: string
            enum:
              - kitchen
              - powder room
              - ensuite
              - family room
              - exterior front
              - backyard
              - staircase
              - primary bedroom
              - laundry room
              - office
              - garage
        - name: den
          in: query
          description: Filter listings by den description.
          schema:
            type: string
        - name: displayAddressOnInternet
          in: query
          description: "If not specified, returns both listings whose address may be displayed on the internet (Y) and whose address should not be displayed on the the internet (N)<br/><br/>Allowed values: <code>Y</code>, <code>N</code>"
          schema:
            type: string
            enum:
              - "Y"
              - "N"
        - name: displayInternetEntireListing
          in: query
          description: Used to filter listings permitted for display on internet portals. "Y" indicates that the listing can be displayed, "N" indicates that it can not and may only be used for back office purposes.
          schema:
            type: string
            enum:
              - "Y"
              - "N"
        - name: displayPublic
          in: query
          description: "If not specified, returns both listings that may be displayed publicly (Y) and those that should be password protected (N)<br/><br/>Allowed values: <code>Y</code>, <code>N</code>"
          schema:
            type: string
            enum:
              - "Y"
              - "N"
        - name: district
          in: query
          description: Filter by the geographical district of the listing
          schema:
            type: string
        - name: driveway
          in: query
          description: Filters listings by one or more values for driveway.
          schema:
            type: array
            items:
              type: string
        - name: exteriorConstruction
          in: query
          description: Filters listings by one or more values for exteriorConstruction - note, matches details.exteriorConstruction1 and details.exteriorConstruction2 fields.
          schema:
            type: array
            items:
              type: string
        - name: fields
          in: query
          description: "Use if you want to limit the response to containing certain fields only. For example: fields?listPrice,soldPrice would limit the response to contain listPrice and soldPrice only. You can also specify the amount of images to return, for example if a listing has 40 images total and you specify fields=images[5] it will only return the first 5 images."
          schema:
            type: string
        - name: garage
          in: query
          description: Filter listings by garage description.
          schema:
            type: array
            items:
              type: string
        - name: hasAgents
          in: query
          description: If true, only returns listings that have a listing agent assigned to them, if false, only returns listings that do not have a listing agent assigned to them. If not specified, returns both.
          schema:
            type: boolean
        - name: hasImages
          in: query
          description: If not specified, returns both listings that have images (true) and listings that do not have images (false).
          schema:
            type: boolean
        - name: heating
          in: query
          description: Filters listings by one or more values for heating.
          schema:
            type: array
            items:
              type: string
        - name: lastPriceChangeType
          in: query
          description: Allows you to find listings that have either increased or decreased in price.
          schema:
            type: string
            enum:
              - decrease
              - increase
              - ""
            default: ""
        - name: lastStatus
          in: query
          description: "Filters the last status of the listing. Multiple values may be used, ie: lastStatus=sus&lastStatus=sld&laststatus=exp </BR> Allowed values: <code>Sus</code>, <code>Exp</code>, <code>Sld</code>, <code>Ter</code>, <code>Dft</code>, <code>Lsd</code>, <code>Sc</code>, <code>Sce</code>, <code>Lc</code>, <code>Pc</code>, <code>Ext</code>, <code>New</code>.<br/><br/>For more information on lastStatus meanings refer to <a target=\"_blank\" href=\"https://help.repliers.com/en/article/laststatus-definitions-8mokhu\">lastStatus Definitions</a>"
          schema:
            type: array
            items:
              type: string
        - name: lat
          in: query
          description: Accepts a value for latitude. Must be used with radius parameter to return listings within a certain radius of a given latitude and longitude.
          schema:
            type: string
        - name: listDate
          in: query
          description: "Filter listings by a specific date that the listings were added to the MLS. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: listings
          in: query
          description: If false, the listings object will be empty. Useful for speeding up responses when statistics and aggregates are requested and listings are not needed. Default is true.
          schema:
            type: boolean
        - name: locationId
          in: query
          description: Filters listings by one or more values for locationId. For locations that have boundary data, the location boundary will be used to find listings that fall within the boundary. For locations that do not have boundary data, address components will be used to filter listings.
          schema:
            type: array
            items:
              type: string
        - name: locker
          in: query
          description: Filters listings by one or more values for locker.
          schema:
            type: array
            items:
              type: string
        - name: long
          in: query
          description: Accepts a value for longitude. Must be used with radius parameter to return listings within a certain radius of a given latitude and longitude.
          schema:
            type: string
        - name: map
          in: query
          description: "Filters listings within a geoJSON polygon or multi-polygon boundary.<br/><br/>Example boundary:[[[-79.14121,43.79041],[-79.132627,43.773059],[-79.188932,43.886988],[-79.200605,43.877832],[-79.236654,43.869665],[-79.265836,43.860011],[-79.281972,43.856051],[-79.322828,43.84689],[-79.368146,43.839214],[-79.386021,43.836139],[-79.41486,43.838616],[-79.423787,43.836635],[-79.475285,43.82227],[-79.480092,43.813352],[-79.480778,43.803441],[-79.485585,43.79799],[-79.493825,43.794025],[-79.556996,43.779649],[-79.601628,43.761303],[-79.61611,43.758572],[-79.629934,43.750141],[-79.625471,43.728064],[-79.616888,43.713177],[-79.606245,43.695555],[-79.601095,43.685873],[-79.593885,43.681156],[-79.590109,43.672465],[-79.582212,43.671224],[-79.574659,43.670975],[-79.535177,43.58325],[-79.424627,43.619052],[-79.385488,43.602645],[-79.315451,43.612092],[-79.14121,43.79041]]].<BR/><BR/>For more information refer to the implementation guide: <a target=\"_blank\" href=\"https://help.repliers.com/en/article/filtering-listings-geo-spatially-using-the-map-parameter-7sorw0/\">Filtering Listings Geo-Spatially Using the \"map\" Parameter</a>"
          schema:
            type: string
            format: json
        - name: mapOperator
          in: query
          description: When a multi-polygon is provided for the "map" parameter the default condition is "OR", meaning that it will return all listings that fall inside any of the polygons. This can be changed to "AND" in which case it will return listings that fall inside all of the polygons.
          schema:
            type: string
            enum:
              - OR
              - AND
              - ""
            default: ""
        - name: maxBaths
          in: query
          schema:
            type: integer
            format: int32
        - name: maxBathroomsHalf
          in: query
          description: The maximum amount of half bathrooms to be used as a filter for this search.
          schema:
            type: integer
            format: int32
        - name: maxBedrooms
          in: query
          description: Filters properties based on the number of bedrooms that were part of the original floorplan, typically located above grade.
          schema:
            type: integer
            format: int32
        - name: maxBedroomsPlus
          in: query
          description: Filters properties based on the number of additional bedrooms added beyond the original floorplan. These bedrooms can be located in areas like basements or attics and were not part of the initial construction.
          schema:
            type: integer
            format: int32
        - name: maxBedroomsTotal
          in: query
          description: Filters properties by the total number of bedrooms, combining both numBedrooms and numBedroomsPlus. This provides a comprehensive look at all spaces being used as bedrooms.
          schema:
            type: integer
            format: int32
        - name: maxClosedDate
          in: query
          description: "Filter listings that have Close Date on or before the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: maxDaysOnMarket
          in: query
          description: Filter `status=U` listings that have been on the market for number of days less than or equal to the supplied value.
          schema:
            type: integer
            format: int32
        - name: maxKitchens
          in: query
          schema:
            type: integer
            format: int32
        - name: maxListDate
          in: query
          description: "Filter listings that were listed on or before the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: maxLotSizeSqft
          in: query
          description: Filter lot size by maximum square feet.
          schema:
            type: integer
            format: int32
        - name: maxMaintenanceFee
          in: query
          description: If supplied, filters listings whose maintenance fee is <= the supplied value.
          schema:
            type: integer
            format: int32
        - name: maxOpenHouseDate
          in: query
          description: "If specified, filters listings that have an open house on or before the supplied date. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: maxParkingSpaces
          in: query
          schema:
            type: integer
            format: int32
        - name: maxPrice
          in: query
          schema:
            type: integer
            format: int32
        - name: maxPriceChangeDateTime
          in: query
          description: Filters listings that have had a price change on or before the date specified.
          schema:
            type: string
            format: date
        - name: maxRepliersUpdatedOn
          in: query
          description: Filters listings whose repliersUpdatedOn is the same or less than the supplied DateTime. repliersUpdatedOn is an internal timestamp, this may be useful for polling applications to identify listings that have updates in information that's exclusive of MLS updates. For example, if an estimate is recalculated since the estimate is not provided by the MLS.
          schema:
            type: string
            format: date
        - name: maxSoldDate
          in: query
          description: "Filter listings that were sold/leased on or before the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: maxSoldPrice
          in: query
          description: Filter listings whose sold price is <= the supplied value.
          schema:
            type: integer
            format: int32
        - name: maxStreetNumber
          in: query
          description: This parameter enables users to filter results by specifying the maximum street number. It ensures that the street number of the listing is less than or equal to the value provided. This is helpful when users are interested in properties within a specific range of street numbers, excluding listings that fall outside this range.
          schema:
            type: integer
            format: int32
        - name: maxStories
          in: query
          description: Filter listings whose stories are <= the supplied value.
          schema:
            type: integer
            format: int32
        - name: maxSqft
          in: query
          description: Filter listings whose square footage is <= the supplied value. Note - excludes listings where the sqft value is not supplied by the MLS.
          schema:
            type: integer
            format: int32
        - name: maxTaxes
          in: query
          description: Filters listings whose annual tax amount is equal to or less than the supplied value.
          schema:
            type: integer
            format: int32
        - name: maxUnavailableDate
          in: query
          description: Filter listings that became unavailable on or before the supplied value. Not all MLSes support this parameter.
          schema:
            type: string
            format: date
        - name: maxUpdatedOn
          in: query
          description: Filter listings that were updated on or before the supplied value.
          schema:
            type: string
            format: date
        - name: maxYearBuilt
          in: query
          description: Filter listings whose year built value is <= the supplied value. excludes listings where the year built value is not supplied by the MLS.
          schema:
            type: integer
            format: int32
        - name: minBaths
          in: query
          schema:
            type: integer
            format: int32
        - name: minBathroomsHalf
          in: query
          description: The minimum amount of half bathrooms to be used as a filter for this search.
          schema:
            type: integer
            format: int32
        - name: minBedrooms
          in: query
          description: Filters properties based on the number of bedrooms that were part of the original floorplan, typically located above grade.
          schema:
            type: integer
            format: int32
        - name: minBedroomsPlus
          in: query
          description: Filters properties based on the number of additional bedrooms added beyond the original floorplan. These bedrooms can be located in areas like basements or attics and were not part of the initial construction.
          schema:
            type: integer
            format: int32
        - name: minBedroomsTotal
          in: query
          description: Filters properties by the total number of bedrooms, combining both numBedrooms and numBedroomsPlus. This provides a comprehensive look at all spaces being used as bedrooms.
          schema:
            type: integer
            format: int32
        - name: minClosedDate
          in: query
          description: "Filter listings that have Close Date on or after the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: minDaysOnMarket
          in: query
          description: Filter `status=U` listings that have been on the market for number of days greater than or equal to the supplied value.
          schema:
            type: integer
            format: int32
        - name: minGarageSpaces
          in: query
          description: Filters listings that have >= the supplied value of garage spaces.
          schema:
            type: integer
            format: int32
        - name: minKitchens
          in: query
          schema:
            type: integer
            format: int32
        - name: minListDate
          in: query
          description: "Filter listings that were listed on or after the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: minLotSizeSqft
          in: query
          description: Filter lot size by minimum square feet.
          schema:
            type: integer
            format: int32
        - name: minOpenHouseDate
          in: query
          description: "If specified, filters listings that have an open house on or after the supplied date. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: minParkingSpaces
          in: query
          schema:
            type: integer
            format: int32
        - name: minPrice
          in: query
          schema:
            type: integer
            format: int32
        - name: minPriceChangeDateTime
          in: query
          description: Filters listings that have had a price change on or after the date specified.
          schema:
            type: string
            format: date
        - name: minRepliersUpdatedOn
          in: query
          description: Filters listings whose repliersUpdatedOn is the same or greater than the supplied DateTime. repliersUpdatedOn is an internal timestamp, this may be useful for polling applications to identify listings that have updates in information that's exclusive of MLS updates. For example, if an estimate is recalculated since the estimate is not provided by the MLS.
          schema:
            type: string
            format: date
        - name: minSoldDate
          in: query
          description: "Filter listings that were sold/leased on or after the supplied value. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: minSoldPrice
          in: query
          description: Filter listings whose sold price is >= the supplied value.
          schema:
            type: string
        - name: minStories
          in: query
          description: Filter listings whose stories are >= the supplied value.
          schema:
            type: integer
            format: int32
        - name: minSqft
          in: query
          description: Filter listings whose square footage is >= the supplied value. Note - excludes listings where the sqft value is not supplied by the MLS.
          schema:
            type: integer
            format: int32
        - name: minStreetNumber
          in: query
          description: This parameter allows users to filter results by specifying the minimum street number. It ensures that the street number of the listing is greater than or equal to the value provided. This is particularly useful for narrowing down search results to properties within a specific range of street numbers.
          schema:
            type: integer
            format: int32
        - name: minTaxes
          in: query
          description: Filters listings whose annual tax amount is equal to or greater than the supplied value.
          schema:
            type: integer
            format: int32
        - name: minUnavailableDate
          in: query
          description: "Filter listings that became unavailable on or after the supplied value. Not all MLSes support this parameter. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: minUpdatedOn
          in: query
          description: Filter listings that were updated on or after the supplied value.
          schema:
            type: string
            format: date
        - name: minYearBuilt
          in: query
          description: Filter listings whose year built value is >= the supplied value. excludes listings where the year built value is not supplied by the MLS.
          schema:
            type: string
        - name: mlsNumber
          in: query
          description: Filter listings by one or more MLS numbers.
          schema:
            type: array
            items:
              type: string
        - name: neighborhood
          in: query
          description: Filter by the geographical neighborhood that the listing is situated in. For example GET /listings?city=Vaughan&neighborhood=Sonoma Heights&neighborhood=Vellore Village
          schema:
            type: array
            items:
              type: string
        - name: officeId
          in: query
          description: Filter listings by the office ID of the listing brokerage.
          schema:
            type: string
        - name: operator
          in: query
          description: If set to "AND", listings must match all supplied parameters. If set to "OR", listings must match at least 1 parameter. Default is "AND"
          schema:
            type: string
            enum:
              - AND
              - OR
              - ""
            default: ""
        - name: pageNum
          in: query
          description: If specified indexes a specific page in the results set. For example, if there are 1000 listings and 100 listings per page, if you'd like to view listings 101-201 you'd specify pageNum=2
          schema:
            type: integer
            format: int32
        - name: propertyType
          in: query
          description: Filters listings by one or more property types.
          schema:
            type: array
            items:
              type: string
        - name: propertyTypeOrStyle
          in: query
          description: Filters listings where either details.propertyType or the details.style field matches any of the provided values.
          schema:
            type: array
            items:
              type: string
        - name: radius
          in: query
          description: Accepts a value for radius in KM. Must be used with lat and long parameters to return listings within a certain radius of a given latitude and longitude.
          schema:
            type: integer
            format: int32
        - name: resultsPerPage
          in: query
          description: The amount of listings to return in each page of the results set.
          schema:
            type: integer
            format: int32
        - name: search
          in: query
          description: One or more keywords may be specified to filter the results by. For more information refer to <a target="_blank" href="https://help.repliers.com/en/article/full-text-keyword-search-implementation-guide-1osixqn">Full-Text Keyword Search Implementation Guide</a>.
          schema:
            type: string
        - name: searchFields
          in: query
          description: To be used in conjunction with the "search" parameter. If specified, limits the keyword search to specific fields. For example, if search=yonge and you want to limit the search to streetName you would specify searchFields=address.streetName
          schema:
            type: string
        - name: sortBy
          in: query
          description: The attribute that the listings will be sorted by. Note, distanceAsc and distanceDesc must be used in combination with lat, long and radius parameters. Default is updatedOnDesc
          schema:
            type: string
            enum:
              - createdOnDesc
              - updatedOnDesc
              - createdOnAsc
              - distanceAsc
              - distanceDesc
              - updatedOnAsc
              - soldDateAsc
              - soldDateDesc
              - soldPriceAsc
              - soldPriceDesc
              - sqftAsc
              - sqftDesc
              - listPriceAsc
              - listPriceDesc
              - bedsAsc
              - bedsDesc
              - bathsDesc
              - bathsAsc
              - yearBuiltDesc
              - yearBuiltAsc
              - random
              - repliersUpdatedOnAsc
              - repliersUpdatedOnDesc
              - ""
            default: ""
        - name: sqft
          in: query
          description: Filters listings by one or more values for sqft.
          schema:
            type: array
            items:
              type: string
        - name: statistics
          in: query
          description: Use this parameter to request statistics relevant to the listings returned in your search. For more information, refer to the <a target="_blank" href="https://help.repliers.com/en/article/real-time-market-statistics-implementation-guide-l3b1uy/">Real-Time Market Statistics Implementation Guide</a>
          schema:
            type: string
        - name: standardStatus
          in: query
          description: "Use this parameter to filter by Standard Status. <br/><br/>Allowed values: <code>Active</code>, <code>Active Under Contract</code>, <code>Canceled</code>, <code>Closed</code>, <code>Coming Soon</code>, <code>Delete</code>, <code>Expired</code>, <code>Hold</code>, <code>Incomplete</code>, <code>Pending</code>, <code>Withdrawn</code>"
          schema:
            type: array
            items:
              type: string
        - name: status
          in: query
          description: Set `status=A` to retrieve active listings. Set `status=U` to retrieve unavailable listings. Set `status=A&status=U` to retrieve both active and unavailable listings.
          schema:
            type: array
            items:
              type: string
            default:
              - A
        - name: streetDirection
          in: query
          description: Filter listings by one or more street directions
          schema:
            type: array
            items:
              type: string
        - name: streetName
          in: query
          description: Filter by the street name of the listing (excluding the street suffix and direction, for example "Yonge")
          schema:
            type: string
        - name: streetNumber
          in: query
          description: Filter by the street number of the listing.
          schema:
            type: string
        - name: streetSuffix
          in: query
          description: Filter listings by one or more street suffixes
          schema:
            type: array
            items:
              type: string
        - name: style
          in: query
          description: Filter by the property style of the listing.
          schema:
            type: array
            items:
              type: string
        - name: swimmingPool
          in: query
          description: Filter listings by one of more values for swimmingPool.
          schema:
            type: array
            items:
              type: string
        - name: type
          in: query
          description: "Used to filter properties that are for sale or for lease. If not specified, will return listings of all types. <br/><br/> Allowed values: <br/><br/> <code>sale</code>, <code>lease</code>"
          schema:
            type: array
            items:
              type: string
        - name: unitNumber
          in: query
          description: Filter by one or more unit numbers.
          schema:
            type: array
            items:
              type: string
        - name: updatedOn
          in: query
          description: "Filter listings by a specific date that the listings were last updated on the MLS. Date format: <code>YYYY-MM-DD</code>"
          schema:
            type: string
            format: date
        - name: waterSource
          in: query
          description: Filter listings by one or more values for waterSource.
          schema:
            type: array
            items:
              type: string
        - name: repliersUpdatedOn
          in: query
          description: Filters listings whose repliersUpdatedOn is a specific date. repliersUpdatedOn is an internal timestamp, this may be useful for polling applications to identify listings that have updates in information that's exclusive of MLS updates. For example, if an estimate is recalculated since the estimate is not provided by the MLS.
          schema:
            type: string
            format: date
        - name: sewer
          in: query
          description: Filters listings by one or more values for sewer.
          schema:
            type: array
            items:
              type: string
        - name: state
          in: query
          description: Filter by the address state of the listing, for example "NY"
          schema:
            type: array
            items:
              type: string
        - name: waterfront
          in: query
          description: If not specified, returns both listings that are waterfront and those that are not. If "Y", returns listings that are waterfront, if "N" returns listings that are not waterfront or unspecified.
          schema:
            type: string
            enum:
              - "Y"
              - "N"
        - name: yearBuilt
          in: query
          description: Filter listings by one or more values for yearBuilt.
          schema:
            type: array
            items:
              type: string
        - name: zip
          in: query
          description: Filters listings by postal or zip code.
          schema:
            type: array
            items:
              type: string
        - name: zoning
          in: query
          description: Filter listings by zoning description.
          schema:
            type: string
