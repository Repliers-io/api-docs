  /listings/{mlsNumber}/similar:
    get:
      summary: Get similar listings
      description: |-
        Provide this endpoint with an mls number and it'll retrieve similar properties that are also for sale.

        This is really useful if you'd like to show your users other properties they may be interested in.

        By default this endpoint will retrieve similar properties in the same neighborhood, however you can override this by using a radius parameter.
      operationId: find-similar-listings
      parameters:
        - name: mlsNumber
          in: path
          description: The MLS number of the listing you wish to retrieve similar listings for.
          schema:
            type: string
          required: true
        - name: boardId
          in: query
          description: Filter by boardId. This is only required if your account has access to more than one MLS. You may specify one or more board IDs to filter by, if not specified, returns all boards that that account has access to be default.
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: fields
          in: query
          description: "Use if you want to limit the response to containing certain fields only. For example: `fields=listPrice,soldPrice` would limit the response to contain `listPrice` and `soldPrice` only. You can also specify the amount of images to return, for example if a listing has 40 images total and you specify `fields=images[5]` it will only return the first 5 images."
          schema:
            type: string
        - name: listPriceRange
          in: query
          description: If specified, returns similar listings whose listPrice are +/- the supplied value, for a given listing. For example, if the given listing is 1M and listPriceRange is 250k, similar listings between 750k and 1.25M will be returned.
          schema:
            type: integer
            format: int32
        - name: radius
          in: query
          description: If specified, will show similar listings within the specified radius (km). If not specified, defaults to showing listings in the same neighborhood.
          schema:
            type: integer
            format: int32
        - name: sortBy
          in: query
          description: Allowed values:<br/><br/><code>updatedOnDesc</code>,<code>updatedOnAsc</code>,<code>createdOnAsc</code>,<code>createdOnDesc</code>
          schema:
            type: string
            default: updatedOnDesc
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /listings/history:
    get:
      summary: Get address history
      description: |-
        Use this endpoint to retrieve the MLS history of a specific address.

        In addition to displaying the history you could also use the information in the response to create a graph that illustrates the change in value over time.
      operationId: lookup-address-history
      parameters:
        - name: city
          in: query
          description: The city of the property. Note - a city is not required if a zip is provided.
          required: true
          schema:
            type: string
        - name: streetName
          in: query
          required: true
          schema:
            type: string
        - name: streetNumber
          in: query
          required: true
          schema:
            type: string
        - name: unitNumber
          in: query
          schema:
            type: string
        - name: streetSuffix
          in: query
          schema:
            type: string
        - name: streetDirection
          in: query
          schema:
            type: string
        - name: zip
          in: query
          description: The zip code or postal code of the property. Supports partial match, for example if supplied value is "123" it will match "12345".  Note - a zip is not required if a city is provided.
          required: true
          schema:
            type: string
        - name: mlsNumber
          in: query
          description: If specified, will return the history for the property that can be identified by the given MLS number
          schema:
            type: string
        - name: addressKey
          in: query
          description: The address key of the property. Please see the address object of a listing to understand how the address key is constructed
          schema:
            type: string
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /listings/deleted:
    get:
      summary: Get deleted listings
      description: Use this endpoint to retrieve listings that have been deleted from the MLS. Listings that have been deleted from the MLS should not be displayed in your websites and apps. Note - deleted listings are not applicable in some MLSes.
      operationId: get-deleted-listings
      parameters:
        - name: updatedOn
          in: query
          schema:
            type: string
            format: date
        - name: minUpdatedOn
          in: query
          schema:
            type: string
            format: date
        - name: maxUpdatedOn
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /listings/locations:
    get:
      summary: Areas, cities and neighborhoods (Deprecated)
      description: "**Deprecated.** Use [GET /locations](/docs/repliers-openapi/get-locations) instead.<br/><br/>Use this endpoint to list geographical location data such as areas, cities and neighborhoods."
      operationId: locations
      parameters:
        - name: area
          in: query
          description: Limits location metadata to areas, cities and neighborhoods whose area matches the supplied valued.
          schema:
            type: string
        - name: city
          in: query
          description: Limits location metadata to areas, cities and neighborhoods whose city matches the supplied valued.
          schema:
            type: string
        - name: class
          in: query
          description: Limits location metadata to areas, cities and neighborhoods whose class matches the supplied valued.
          schema:
            type: string
            enum:
              - residential
              - condo
              - commercial
        - name: neighborhood
          in: query
          description: Limits location metadata to areas, cities and neighborhoods whose neighborhood matches the supplied valued.
          schema:
            type: string
        - name: search
          in: query
          description: If a value is supplied, limits location meta data to areas, cities or neighborhoods that match or partially match the supplied value.
          schema:
            type: string
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: true
  /listings/property-types: {}
