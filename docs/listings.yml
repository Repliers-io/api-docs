  /listings/{mlsNumber}:
    get:
      summary: Get a single listing
      description: |-
        Use this endpoint to get details about a specific listing.

        When requesting a specific listing an expanded view of the listing is provided which includes comparables as well as the MLS history for the specific property. This is useful for building single property views within your app or website.
      operationId: get-a-listing
      parameters:
        - name: boardId
          in: query
          description: Filter by boardId. This is only required if your account has access to more than one MLS.
          schema:
            type: integer
            format: int32
        - name: mlsNumber
          in: path
          description: The MLS number of the listing you wish to retrieve.
          schema:
            type: string
          required: true
