openapi: 3.1.0
info:
  title: Favorites API
  version: 1.0.0
servers:
  - url: https://api.repliers.io
paths:
  /favorites:
    post:
      summary: Add a favorite
      description: Adds a property to a client's favorites list. You can optionally include comments and tags — comments let clients note their thoughts on a property, and tags enable filtering favorites by custom categories.
      externalDocs:
        description: Creating a Favorite
        url: https://help.repliers.com/en/article/favorite-listings-implementation-guide-u9g9u/#6-creating-a-favorite
      operationId: add-a-favorite
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - mlsNumber
              properties:
                boardId:
                  type: integer
                  description: Required if your account has access to multiple MLSes.
                  format: int32
                clientId:
                  type: integer
                  format: int32
                comments:
                  type: string
                  description: Comments may be associated with a favorite, for example "I love the view in the backyard".
                mlsNumber:
                  type: string
                tags:
                  type: array
                  description: Tags may be added to favorites. This is a useful feature if you want to allow your users to filter their favorites.
                  items:
                    type: string
      responses:
        "200":
          description: Favorite successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  favoriteId:
                    type: integer
                    description: Unique identifier of the newly created favorite
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    get:
      summary: Get favorites
      description: Returns a list of properties that a client has favorited. Results can be filtered by listing status, last status, and tags, making it easy to surface only the most relevant favorites.
      externalDocs:
        description: Listing and Filtering Favorites
        url: https://help.repliers.com/en/article/favorite-listings-implementation-guide-u9g9u/#6-listing-and-filtering-favorites
      operationId: get-favorites
      parameters:
        - name: boardId
          in: query
          description: Required if your account has access to multiple MLSes. Filters favorites to a specific board.
          schema:
            type: integer
            format: int32
        - name: clientId
          in: query
          description: The ID of the client whose favorites to retrieve.
          required: true
          schema:
            type: integer
            format: int32
        - name: fields
          in: query
          description: "Use if you want to limit the response to containing certain fields only. For example: fields?listPrice,soldPrice would limit the response to contain listPrice and soldPrice only. You can also specify the amount of images to return, for example if a listing has 40 images total and you specify fields=images[5] it will only return the first 5 images."
          schema:
            type: string
        - name: lastStatus
          in: query
          description: Filters favorites by the last status of the favorited listing.
          schema:
            type: array
            items:
              type: string
        - name: pageNum
          in: query
          description: The page number to return. For example, with 100 results per page, specifying pageNum=2 returns results 101–200.
          schema:
            type: integer
            format: int32
        - name: resultsPerPage
          in: query
          description: The number of favorites to return per page.
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          description: Filters favorites by the current status of the favorited listing.
          schema:
            type: string
        - name: tags
          in: query
          description: Allows you to search tags within favorites, accepts a comma-separated string, for example "needs work, turn-key"
          schema:
            type: string
        - name: lat
          in: query
          description: Accepts a value for latitude. Can be used only for sorting with `distanceAsc` or `distanceDesc`.
          schema:
            type: string
        - name: long
          in: query
          description: Accepts a value for longitude. Can be used only for sorting with `distanceAsc` or `distanceDesc`. Must be used with `lat` and `radius` parameters to return listings within a certain radius of a given latitude and longitude.
          schema:
            type: string
        - name: pretty
          in: query
          description: If true, returns the response in a human-readable formatted JSON.
          schema:
            type: boolean
        - name: sortBy
          in: query
          description: The attribute that the favorites will be sorted by. Note, `distanceAsc` and `distanceDesc` must be used in combination with `lat`, `long` parameters. Default is `updatedOnDesc`.
          schema:
            type: string
            enum:
              - createdOnDesc
              - updatedOnDesc
              - createdOnAsc
              - updatedOnAsc
              - soldDateAsc
              - soldDateDesc
              - soldPriceAsc
              - soldPriceDesc
              - listPriceAsc
              - listPriceDesc
              - bedsAsc
              - bedsDesc
              - bathsDesc
              - bathsAsc
              - yearBuiltDesc
              - yearBuiltAsc
              - random
              - distanceAsc
              - distanceDesc
              - sqftAsc
              - sqftDesc
              - repliersUpdatedOnDesc
              - repliersUpdatedOnAsc
              - statusAscListDateAsc
              - statusAscListDateDesc
              - statusAscListPriceAsc
              - statusAscListPriceDesc
              - qualityAsc
              - qualityDesc
              - listPricePerSqFtAsc
              - listPricePerSqFtDesc
              - soldPricePerSqFtAsc
              - soldPricePerSqFtDesc
