  /favorites/{favoriteId}:
    patch:
      summary: Update a favorite
      description: Updates the comments or tags on an existing favorite.
      operationId: update-a-favorite
      parameters:
        - name: favoriteId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: string
                  description: Updated comments for the favorite.
                tags:
                  type: array
                  description: Updated tags for the favorite.
                  items:
                    type: string
      responses:
        "200":
          description: Favorite successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId:
                    type: integer
                    description: ID of the client who owns the favorite
                  mlsNumber:
                    type: string
                    description: MLS listing number of the favorited property
                  tags:
                    type: [string, "null"]
                    description: Tags associated with the favorite
                  comments:
                    type: [string, "null"]
                    description: Client comments on the favorited listing
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    delete:
      summary: Delete a favorite
      description: Removes a property from a client's favorites list.
      externalDocs:
        description: Deleting a Favorite
