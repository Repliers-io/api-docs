openapi: 3.1.0
info:
  title: Agents API
  version: 1.0.0
servers:
  - url: https://api.repliers.io
paths:
  /agents:
    post:
      summary: Create an agent
      description: Use this endpoint to create an agent. Each client that you create needs to be associated with an agent, therefore it's necessary to create at least one agent before you start creating clients.
      externalDocs:
        description: "Step 1: Create an Agent"
        url: https://help.repliers.com/en/article/implementation-guide-for-agents-and-clients-of4k3i/#2-step-1-create-an-agent
      operationId: create-an-agent
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - fname
                - lname
                - phone
                - email
                - brokerage
                - designation
              properties:
                fname:
                  type: string
                  description: The first name of the agent.
                lname:
                  type: string
                  description: The last name of the agent.
                phone:
                  type: string
                  description: "The mobile phone number of the agent. Must be 11 digits in length.<br/><br/>Regex pattern: <code>^(1)([0-9]{10})$</code>"
                email:
                  type: string
                  description: "The email address of the agent.<br/><br/>Regex pattern: <code>^(([^<>()\\[\\]\\\\.,;:\\s@\"]+(\\.[^<>()\\[\\]\\\\.,;:\\s@\"]+)*)|(\".+\"))@((\\[[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}])|(([a-zA-Z\\-0-9]+\\.)+[a-zA-Z]{2,}))</code>"
                brokerage:
                  type: string
                  description: The name of the Brokerage/Office that this agent is registered with.
                designation:
                  type: string
                  description: This agent's designation. For example, "Sales Representative"
                avatar:
                  type: string
                  description: A URL/Path to an avatar/picture of this agent.
                status:
                  type: boolean
                  description: If false, disables all operations for the agent.
                  default: true
                location:
                  properties:
                    latitude:
                      type: string
                      description: A latitude value representing the location of the agent. Required if a value for longitude is provided.
                    longitude:
                      type: string
                      description: A longitude value representing the location of the agent. Required if a value for latitude is specified.
                  required: []
                  type: object
                externalId:
                  type: string
                  description: The externalId is intended for storing agent identifiers from external systems (such as CRMs) for reference purposes.
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    get:
      summary: Filter agents
      description: Use this endpoint to get a list of agents that you've created. You can filter for specific agents using parameters like email address and first name. If you don't use any filters all agents will be returned.
      operationId: find-agents
      parameters:
        - name: agentId
          in: query
          description: Filters agents by their unique ID.
          schema:
            type: integer
            format: int32
        - name: boardId
          in: query
          description: Filters agents by the MLS board they belong to.
          schema:
            type: integer
            format: int32
        - name: brokerage
          in: query
          description: Filters agents by brokerage name.
          schema:
            type: string
        - name: designation
          in: query
          description: Filters agents by designation (e.g., Sales Representative).
          schema:
            type: string
        - name: email
          in: query
          description: Filters agents by email address.
          schema:
            type: string
        - name: fname
          in: query
          description: Filters agents by first name.
          schema:
            type: string
        - name: lname
          in: query
          description: Filters agents by last name.
          schema:
            type: string
        - name: phone
          in: query
          description: Filters agents by phone number.
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          description: If false, returns only disabled agents. If true, returns only active agents.
          schema:
            type: boolean
        - name: externalId
          in: query
          description: Filters agents by their identifier from an external system (such as a CRM).
          schema:
            type: string
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /agents/{agentId}:
    patch:
      summary: Update an agent
      description: Updates one or more fields for an existing agent. Only include the fields you wish to change — omitted fields retain their current values.
      externalDocs:
        description: Update a Client or Agent
        url: https://help.repliers.com/en/article/implementation-guide-for-agents-and-clients-of4k3i/#2-step-4-update-a-client-or-agent
      operationId: update-an-agent
      parameters:
        - name: agentId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fname:
                  type: string
                  description: The first name of the agent.
                lname:
                  type: string
                  description: The last name of the agent.
                phone:
                  type: string
                  description: "The mobile phone number of the agent. Must be 11 digits in length.<br/><br/>Regex pattern: <code>^(1)([0-9]{10})$</code>"
                email:
                  type: string
                  description: "The email address of the agent.<br/><br/>Regex pattern: <code>^(([^<>()\\[\\]\\\\.,;:\\s@\"]+(\\.[^<>()\\[\\]\\\\.,;:\\s@\"]+)*)|(\".+\"))@((\\[[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}])|(([a-zA-Z\\-0-9]+\\.)+[a-zA-Z]{2,}))</code>"
                brokerage:
                  type: string
                  description: The name of the Brokerage/Office that this agent is registered with.
                designation:
                  type: string
                  description: This agent's designation. For example, "Sales Representative"
                avatar:
                  type: string
                  description: A URL/Path to an avatar/picture of this agent.
                status:
                  type: boolean
                  description: If false, disables all operations for the agent.
                  default: true
                location:
                  properties:
                    latitude:
                      type: string
                      description: A latitude value representing the location of the agent. Required if a value for longitude is provided.
                    longitude:
                      type: string
                      description: A longitude value representing the location of the agent. Required if a value for latitude is specified.
                  required: []
                  type: object
                externalId:
                  type: string
                  description: The externalId is intended for storing agent identifiers from external systems (such as CRMs) for reference purposes.
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    delete:
      summary: Delete an agent
      description: Use this endpoint to delete an agent. You must specify a new agentId to assign the deleted agent's clients to.
      operationId: delete-an-agent
      parameters:
        - name: agentId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    get:
      summary: Get an agent
      description: Returns the full profile of a specific agent. Useful for building agent profile pages or verifying agent details before making updates.
      operationId: get-an-agent
      parameters:
        - name: agentId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /agents/{agentId}/transfer:
    post:
      summary: Transfer an agent's clients
      description: Transfers all clients from one agent to another. Useful when an agent leaves your organization and their clients need to be reassigned.
      externalDocs:
        description: Transferring an Agent's Clients
        url: https://help.repliers.com/en/article/implementation-guide-for-agents-and-clients-of4k3i/#2-transferring-an-agents-clients
      operationId: transfer-agents
      parameters:
        - name: agentId
          in: path
          description: The agentId of the agent whose clients will be transferred to another agent.
          schema:
            type: integer
            format: int32
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - newAgentId
              properties:
                newAgentId:
                  type: integer
                  description: The agentId of the new agent who will takeover clients from the previous agent.
                  format: int32
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
