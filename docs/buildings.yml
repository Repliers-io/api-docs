openapi: 3.1.0
info:
  title: Buildings API
  description: |
    API for searching and retrieving building information with support for various filtering options.
    Provides endpoints for querying buildings based on location, price, property characteristics,
    and geographical boundaries. Supports pagination, sorting, and geographical radius searches.
  version: 1.0.0
servers:
  - url: https://api.repliers.io
    description: Production server
  - url: https://dev.repliers.io
    description: Development server

paths:
  /buildings:
    post:
      summary: Buildings Search
      description: Searches for buildings based on location, price, property type, and other criteria. A building represents a unique address and groups together all current and historical listings at that address, making it useful for building directory pages and pre-construction research.
      tags:
        - Buildings
      parameters:
        - name: area
          in: query
          description: Filters buildings by geographical area (also referred to as region or county).
          schema:
            type: array
            items:
              type: string

        - name: buildingName
          in: query
          description: Filters buildings by name. Availability of building names may vary by MLS and is not guaranteed for all buildings.
          schema:
            type: array
            items:
              type: string

        - name: city
          in: query
          description: Filters buildings by city.
          schema:
            type: array
            items:
              type: string

        - name: class
          in: query
          description: Filters buildings by property class.
          schema:
            type: array
            items:
              $ref: "components.yml#/components/schemas/PropertyClass"

        - name: displayPublic
          in: query
          description: Filters buildings by public display status. Y returns buildings that may be displayed publicly, N returns buildings that should be password protected.
          schema:
            $ref: "components.yml#/components/schemas/YesNo"

        - name: lat
          in: query
          description: Accepts a value for latitude. Must be used with radius parameter to return buildings within a certain radius of a given latitude and longitude.
          schema:
            type: number
            format: float
            minimum: -90
            maximum: 90

        - name: long
          in: query
          description: Accepts a value for longitude. Must be used with radius parameter to return buildings within a certain radius of a given latitude and longitude.
          schema:
            type: number
            format: float
            minimum: -180
            maximum: 180

        - name: map
          in: query
          description: "GeoJSON polygon or multi-polygon boundary for geographical filtering. Limits results to buildings within the specified boundaries. For complex polygons or multipolygons that exceed query parameter size limits, use the POST method and include the map data in the request body. Format: Array of coordinate arrays, where each coordinate is [longitude, latitude] in WGS 84 format. The polygon must be closed (first and last points must be identical). For more information refer to the implementation guide <a target=\"_blank\" href=\"https://help.repliers.com/en/article/filtering-listings-geo-spatially-using-the-map-parameter-7sorw0/\">Filtering Listings Geo-Spatially Using the \"map\" Parameter</a>"
          schema:
            type: string
            format: json

        - name: maxPrice
          in: query
          description: Filters buildings whose listing prices are <= the supplied value.
          schema:
            type: integer
            minimum: 0

        - name: maxStories
          in: query
          description: Filters buildings whose story count is <= the supplied value.
          schema:
            type: integer
            minimum: 1

        - name: minBathrooms
          in: query
          description: Filters buildings whose bathroom count is >= the supplied value.
          schema:
            type: integer
            minimum: 0

        - name: minBedrooms
          in: query
          description: Filters buildings whose bedroom count is >= the supplied value.
          schema:
            type: integer
            minimum: 0

        - name: minPrice
          in: query
          description: Filters buildings whose listing prices are >= the supplied value.
          schema:
            type: integer
            minimum: 0

        - name: minStories
          in: query
          description: Filters buildings whose story count is >= the supplied value.
          schema:
            type: integer
            minimum: 1

        - name: neighborhood
          in: query
          description: Filters buildings by neighborhood.
          schema:
            type: array
            items:
              type: string

        - name: pageNum
          in: query
          description: The page number to return. For example, with 100 results per page, specifying pageNum=2 returns results 101–200.
          schema:
            type: integer
            minimum: 1
            default: 1

        - name: propertyType
          in: query
          description: Filters buildings by property type.
          schema:
            type: array
            items:
              type: string

        - name: radius
          in: query
          description: Accepts a value for radius in KM. Must be used with `lat` and `long` parameters to return buildings within the specified radius of a given latitude and longitude.
          schema:
            type: number
            format: float
            minimum: 1

        - name: resultsPerPage
          in: query
          description: The number of buildings to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 300
            default: 100

        - name: sortBy
          in: query
          description: Sorts results by the specified field.
          schema:
            $ref: "components.yml#/components/schemas/BuildingsSortBy"

        - name: streetName
          in: query
          description: Filters buildings by street name.
          schema:
            type: array
            items:
              type: string

        - name: streetNumber
          in: query
          description: Filters buildings by street number.
          schema:
            type: array
            items:
              type: string

        - name: type
          in: query
          description: Filters buildings by listing type.
          schema:
            $ref: "components.yml#/components/schemas/ListingType"

      requestBody:
        description: |
          Optional request body for complex geographical filtering using GeoJSON polygons.
          Use this for large polygon data that exceeds query parameter size limits.
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                map:
                  $ref: "components.yml#/components/schemas/GeoJSONPolygon"

      responses:
        "200":
          description: Successful response containing list of buildings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "components.yml#/components/schemas/PaginationInfo"
                  - type: object
                    properties:
                      buildings:
                        type: array
                        description: Array of building objects matching the search criteria
                        items:
                          $ref: "#/components/schemas/Building"

        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /buildings/{addressKey}:
    get:
      summary: Get a single building
      description: |
        Use this endpoint to get details about a specific building by its address key.
        The address key can be found in the `address.addressKey` field of building objects returned by the buildings search endpoint.
      tags:
        - Buildings
      parameters:
        - name: addressKey
          in: path
          description: Unique address identifier key for the building. Available from `building.address.addressKey` in search results.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response containing building details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Building not found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    msg:
                      type: string
                      description: Error message
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    Building:
      type: object
      description: Building information including location, pricing, and property details
      properties:
        address:
          type: object
          description: Address components of the building
          properties:
            addressKey:
              type: string
              description: Unique address identifier key
            streetNumber:
              type: string
              description: Street number
            streetName:
              type: string
              description: Street name
            streetSuffix:
              type: string
              description: Street suffix (e.g., Blvd, St, Ave)
            streetDirection:
              type: string
              description: Street direction (e.g., N, S, E, W)
            city:
              type: string
              description: City name
            neighborhood:
              type: string
              description: Neighborhood name
            district:
              type: string
              description: District or municipal division
            area:
              type: string
              description: Area name
            state:
              type: string
              description: State or province name
            country:
              type: string
              description: Country name
            zip:
              type: string
              description: Postal or ZIP code
            majorIntersection:
              type: string
              description: Major intersection or cross streets
        nearby:
          type: object
          properties:
            amenities:
              type: array
              description: List of nearby amenities
              items:
                type: string
        details:
          type: object
          properties:
            yearBuilt:
              type: string
              description: Year the building was built
            buildingName:
              type: string
              description: Name of the building
            minSqft:
              type: integer
              description: Minimum square footage
            maxSqft:
              type: integer
              description: Maximum square footage
        map:
          type: object
          properties:
            latitude:
              type: string
              description: Latitude coordinate
            longitude:
              type: string
              description: Longitude coordinate
            point:
              type: string
              description: WKT (Well-Known Text) representation of the building's center point
        image:
          type: string
          description: Image filename
        class:
          type: string
          description: Property class

  responses:
    NotFound:
      description: Not Found

    Unauthorized:
      description: Unauthorized

    Forbidden:
      description: Forbidden

    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "components.yml#/components/schemas/Error"

    InternalServerError:
      description: Internal Server Error
