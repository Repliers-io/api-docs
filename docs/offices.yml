openapi: 3.1.0
info:
  title: Offices API
  version: 1.0.0
servers:
  - url: https://api.repliers.io
paths:
  /offices:
    get:
      summary: Offices
      description: Use this endpoint to list offices belonging to the MLS. A brokerage may have one or more offices.
      operationId: offices
      parameters:
        - name: pageNum
          in: query
          description: Page number for paginated results.
          schema:
            type: integer
        - name: resultsPerPage
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: officeId
          in: query
          description: If supplied, finds office by officeId using exact match criteria.
          schema:
            type: string
        - name: keywords
          in: query
          description: If supplied, filters offices by the supplied value.
          schema:
            type: string
        - name: boardId
          in: query
          description: Find your boardId by visiting https://login.repliers.com/dashboard/data-access
          schema:
            type: string
      responses:
        "200":
          description: Successful response containing a paginated list of offices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: components.yml#/components/schemas/PaginationInfo
                  - type: object
                    properties:
                      offices:
                        type: array
                        description: Array of office objects
                        items:
                          type: object
                          properties:
                            resource:
                              type: string
                              description: Resource identifier
                            officeId:
                              type: string
                              description: Unique identifier for the office
                            name:
                              type: string
                              description: Name of the office
                            address:
                              type: object
                              description: Address details for the office
                              properties:
                                address1:
                                  type: [string, "null"]
                                  description: Primary address line
                                address2:
                                  type: [string, "null"]
                                  description: Secondary address line
                                city:
                                  type: [string, "null"]
                                  description: City name
                                state:
                                  type: [string, "null"]
                                  description: State or province
                                postal:
                                  type: [string, "null"]
                                  description: Postal or ZIP code
                                country:
                                  type: [string, "null"]
                                  description: Country name
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
      x-readme:
        code-samples:
          - language: text
            code: "{{baseUrl}}/offices?boardId=91"
        samples-languages:
          - text
