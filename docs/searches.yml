    get:
      summary: Get a saved search
      description: Use this endpoint to lookup the details of a saved search.
      operationId: get-a-saved-search
      parameters:
        - name: searchId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /searches/{searchId}/matches:
    get:
      summary: Filter matches
      description: Use this endpoint to lookup matches for a saved search. Matches are listings that met the saved search criteria.
      operationId: filter-matches
      parameters:
        - name: pageNum
          in: query
          description: If specified, indexes a specific page in the results set. For example, if there are 1000 searches and 100 searches per page, if you'd like to view searches 101-201 you'd specify pageNum=2
          schema:
            type: integer
            format: int32
            default: 1
        - name: resultsPerPage
          in: query
          description: The amount of searches to return in each page of the results set.
          schema:
            type: integer
            format: int32
            default: 100
        - name: searchId
          in: path
          schema:
            type: integer
            format: int32
          required: true
        - name: endDate
          in: query
          description: If specified filters matches whose match date is <= the supplied value.
          schema:
            type: string
            format: date
        - name: startDate
          in: query
          description: If specified filters matches whose match date is >= the supplied value.
          schema:
            type: string
            format: date
        - name: lastStatus
          in: query
          description: If specified filters matches whose last status is the supplied value.<br/><br/>Allowed values:<br/><br/><code>Sus</code>, <code>Exp</code>, <code>Sld</code>, <code>Ter</code>, <code>Dft</code>, <code>Lsd</code>, <code>Sc</code>, <code>Lc</code>, <code>Pc</code>, <code>Ext</code>, <code>New</code>
          schema:
            type: string
        - name: liked
          in: query
          description: If true filters search matches that were liked, if false filters search matches that were disliked. If not specified, returns all search matches.
          schema:
            type: boolean
        - name: matchId
          in: query
          schema:
            type: integer
            format: int32
        - name: sortBy
          in: query
          description: Allowed values:<br/><br/><code>updatedOnDesc</code>,<code>createdOnDesc</code>
          schema:
            type: string
            default: updatedOnDesc
        - name: status
          in: query
          description: If not specified returns both available and unavailable listings. If specified limits results to specified status.<br/><br/>Allowed values:<br/><br/><code>A</code>,<code>U</code>
          schema:
            type: string
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
  /searches/{searchId}/matches/{matchId}:
    get:
      summary: Get a match
      description: Use this endpoint to lookup details about a specific match for a saved search.
      operationId: get-a-match
      parameters:
        - name: searchId
          in: path
          schema:
            type: integer
            format: int32
          required: true
        - name: matchId
          in: path
          schema:
            type: integer
            format: int32
          required: true
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
    patch:
      summary: Update a match
      description: Use this endpoint to update attributes associated with a specific match for a saved search.
      operationId: update-a-match
      parameters:
        - name: searchId
          in: path
          schema:
            type: integer
            format: int32
          required: true
        - name: matchId
          in: path
          schema:
            type: integer
