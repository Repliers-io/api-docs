openapi: 3.1.0
info:
  title: Shared Components
  description: |
    Shared components used across multiple API specifications.
    This file contains reusable schemas, responses, parameters, and other components.
  version: 1.0.0

components:
  schemas:
    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        numPages:
          type: integer
          description: Total number of pages
        pageSize:
          type: integer
          description: Number of results per page
        count:
          type: integer
          description: Total number of results

    PropertyClass:
      type: string
      enum: [condo, residential, commercial]
      description: Classification of property type

    ListingType:
      type: string
      enum: [sale, lease]
      description: Whether the property is for sale or lease

    YesNo:
      type: string
      enum: [yes, no]
      description: Yes or No value

    BuildingsSortBy:
      type: string
      enum: [numUnitsDesc]
      description: Sort field for buildings results

    GeoJSONPolygon:
      type: object
      description: |
        GeoJSON polygon for geographical filtering. Limits results to buildings within the specified boundaries.
        Format: Array of coordinate arrays, where each coordinate is [longitude, latitude] in WGS 84 format.
        The polygon must be closed (first and last points must be identical).
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2

    LocationType:
      type: string
      enum:
        [
          area,
          city,
          city-alternate,
          neighborhood,
          neighborhood-alternate,
          postalCode,
          district,
          schoolDistrict,
          school,
        ]
      description: Location type classification

    LocationSource:
      type: string
      enum: [MSL, UserDefined, LiveBy]
      description: Location data source

    Error:
      type: array
      items:
        type: array
        items:
          type: object
          properties:
            param:
              type: string
            msg:
              type: string

  parameters:
    LocationTypeFilter:
      name: type
      in: query
      description: |
        Limits results to specified location types:
        - `area` - Represents larger geographical divisions that may contain multiple cities and neighborhoods. Examples of Areas are counties, regions etc.
        - `city` - Municipal division that can include multiple neighborhoods within its boundaries.
        - `city-alternate` - Alternate representation of a city, used for specific data sources or contexts.
        - `neighborhood` - Smallest geographical unit within a city.
        - `neighborhood-alternate` - Alternate representation of a neighborhood, used for specific data sources or contexts.
        - `postalCode` - Represents postal code areas, which may span multiple neighborhoods or cities.
        - `district` - Represents administrative or political districts, which may span multiple neighborhoods or cities.
        - `schoolDistrict` - Represents school district areas, which may span multiple neighborhoods or cities.
        - `school` - Represents specific school locations and catchment areas.
      required: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/LocationType"

    LocationSourceFilter:
      name: source
      in: query
      description: |
        Filters locations by source:
        - `MSL` - Locations sourced from MLS (Multiple Listing Service) data.
        - `UserDefined` - Custom locations created and defined by users.
        - `LiveBy` - Locations sourced from LiveBy, a third-party neighborhood and community data provider.
      required: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/LocationSource"

  responses:
    EmptySuccess:
      description: "200"
      content:
        application/json:
          examples:
            Result:
              value: "{}"
          schema:
            type: object
            properties: {}
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
