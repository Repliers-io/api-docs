openapi: 3.1.0
info:
  title: Places API
  version: 1.0.0
servers:
  - url: https://api.repliers.io
paths:
  /places:
    get:
      summary: Places
      description: Use this endpoint to retrieve relevant schools, parks, transit stops and safety places for a given latitude and longitude. This endpoint is useful to enrich property and neighborhood views with local places information.
      operationId: places
      parameters:
        - name: lat
          in: query
          description: The latitude of the point that you'd like to retrieve places data for.
          required: true
          schema:
            type: string
        - name: long
          in: query
          description: The longitude of the point that you'd like to retrieve places data for.
          required: true
          schema:
            type: string
        - name: inputInsidePolygon
          in: query
          description: When set to `true`, each returned place that has a boundary polygon will include an `inputInsidePolygon` field indicating whether the specified lat/long falls inside that polygon. All places are returned regardless of this parameter; places without boundaries are unaffected and will not include this field.
          required: false
          schema:
            type: boolean
      responses:
        "200":
          $ref: components.yml#/components/responses/EmptySuccess
        "400":
          $ref: components.yml#/components/responses/BadRequest
      deprecated: false
